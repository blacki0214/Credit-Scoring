name: Deploy to Google Cloud Run

# Required GitHub Secrets (using Workload Identity Federation - no keys needed!):
# - GCP_PROJECT_ID: project-71e73ad8-4a84-471e-b69
# - GCP_SERVICE_ACCOUNT: github-actions-cicd@project-71e73ad8-4a84-471e-b69.iam.gserviceaccount.com
# - GCP_WORKLOAD_IDENTITY_PROVIDER: projects/976448868286/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
#
# Service Account has these roles:
# - roles/run.admin (Cloud Run Admin)
# - roles/artifactregistry.writer (Artifact Registry Writer)
# - roles/iam.serviceAccountUser (Service Account User)
# - roles/storage.objectAdmin (Storage Object Admin)

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  PROJECT_ID: project-71e73ad8-4a84-471e-b69  # GCP project ID
  PROJECT_NUMBER: 976448868286  # GCP project number
  SERVICE_NAME: credit-scoring-api
  REGION: asia-southeast1  # Singapore region (closest to Vietnam)
  REPOSITORY: credit-scoring  # Artifact Registry repository name

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate with Google Cloud using Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      
      - name: Enable Required APIs
        run: |
          gcloud services enable artifactregistry.googleapis.com --project=${{ env.PROJECT_ID }}
          gcloud services enable run.googleapis.com --project=${{ env.PROJECT_ID }}
          gcloud services enable cloudbuild.googleapis.com --project=${{ env.PROJECT_ID }}
        continue-on-error: true
      
      - name: Create Artifact Registry Repository (if not exists)
        run: |
          # Check if repository exists
          if ! gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
            --location=${{ env.REGION }} &>/dev/null; then
            echo "Creating Artifact Registry repository..."
            gcloud artifacts repositories create ${{ env.REPOSITORY }} \
              --repository-format=docker \
              --location=${{ env.REGION }} \
              --description="Docker repository for Credit Scoring API"
          else
            echo "Repository already exists"
          fi
      
      - name: Build and Push Docker Image with Cloud Build
        run: |
          cd credit-scoring-api
          # Build and push with commit SHA tag
          gcloud builds submit \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --timeout=20m
          
          # Tag as latest
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" \
            --set-secrets "SECRET_KEY=credit-api-secret-key:latest,API_KEY=credit-api-key:latest" \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --port 8080
      
      - name: Show Service URL
        run: |
          echo "Service deployed successfully!"
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'
