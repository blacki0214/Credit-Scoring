services:
  credit-scoring-api:
    build: .
    container_name: credit-scoring-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DEMO_AUTH_BYPASS_ENABLED=true
    volumes:
      - ./models:/app/models:ro  # Read-only models
      - ../output:/output:ro     # Student alternative model artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s